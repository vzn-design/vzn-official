<!DOCTYPE html>

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0a0a0a;color:#f4f2ee;font-family:'Karla',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 24px;overflow:hidden;}

    h1 em{font-style:italic;color:#C9A84C;}
    p{font-size:13px;color:rgba(255,255,255,.45);letter-spacing:.15em;line-height:1.8;margin-bottom:48px;max-width:360px;}
    .btn{display:inline-block;background:#C9A84C;color:#0a0a0a;font-family:'Karla',sans-serif;font-size:10px;font-weight:600;letter-spacing:.35em;text-transform:uppercase;padding:16px 36px;text-decoration:none;transition:background .3s;}
    .btn:hover{background:#f4f2ee;}
